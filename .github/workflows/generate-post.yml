name: Generate Artifact Post

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
    - cron: '0 9 * * 3'  # Wednesday fallback if Monday failed
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check if post already exists this week
        id: weekly-check
        if: github.event_name == 'schedule'
        run: |
          DOW=$(date -u +%u)
          OFFSET=$((DOW - 1))
          THIS_MONDAY=$(date -u -d "${OFFSET} days ago" +%Y-%m-%d)
          if git log --oneline --since="${THIS_MONDAY}" | grep -q "artifact:"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Generate artifact post
        if: steps.weekly-check.outputs.skip != 'true'
        run: node scripts/generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push
        if: steps.weekly-check.outputs.skip != 'true'
        run: |
          git config user.name "artifact-agent"
          git config user.email "agent@billglover.dev"
          git add posts/ index.html scripts/story-state.json
          git diff --staged --quiet || git commit -m "artifact: $(date -u +%Y-%m-%d)"
          git push
      - name: Build
        run: npm run build
      - run: rm -rf node_modules
      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
